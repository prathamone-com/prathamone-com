# Sovereign Curriculum Sync Workflow
# Author: Jawahar R Mallah (AITDL Network)
# Purpose: Automatically mirrors local SQLite curriculum data to Supabase Cloud on push.

name: Mirror Sovereign Curriculum to Supabase

on:
  push:
    branches: ["master"]
    paths:
      - 'packages/db/src/curriculum/curriculum.db'
      - 'packages/db/src/curriculum/sync-engine.ts'
  workflow_dispatch: # Allows manual trigger

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.0.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Run Sync Engine
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          # Use ts-node to run the sync script directly from the package
          pnpm --filter @prathamone/db exec ts-node src/curriculum/sync-engine.ts
